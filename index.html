<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#070B14"/>
<meta name="description" content="ألعاب ذاكرة وتدريب DGR — مطابقة، تشابه، اختبار، وAir Logo"/>
<title>ألعاب الذاكرة - الصفحة الرئيسية</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
<link rel="prefetch" href="/games.json"/>

<style>
:root{
  --bg0:#070B14; --bg1:#0B1220;
  --stroke:rgba(255,255,255,.12);
  --text:#EEF3FF;
  --muted:rgba(238,243,255,.72);
  --shadow:0 18px 55px rgba(0,0,0,.45);
  --accent:#4facfe;
  --accent2:#00f2fe;
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial}
html,body{height:100%;margin:0}
body{
  color:var(--text);
  background:
    radial-gradient(920px 520px at 88% 0%, rgba(79,172,254,.12), transparent 55%),
    linear-gradient(180deg, var(--bg0), var(--bg1));
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.topbar{
  position:fixed;left:12px;right:12px;top:max(10px, env(safe-area-inset-top));z-index:20;
  height:56px;border-radius:20px;border:1px solid var(--stroke);
  background:linear-gradient(180deg, rgba(22,34,56,.96), rgba(10,16,28,.92));
  box-shadow:0 10px 32px rgba(0,0,0,.38);
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
}
.brand{display:flex;flex-direction:column;gap:1px;min-width:0}
.brand .appname{font-size:11px;color:var(--muted)}
.brand .title{font-size:15px;font-weight:900;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconBtn{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  border:1px solid rgba(79,172,254,.28);background:rgba(79,172,254,.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;
  transition:transform .12s ease, background .12s ease;
  -webkit-tap-highlight-color:transparent;color:var(--text);
}
.iconBtn:hover{background:rgba(79,172,254,.14)}
.iconBtn:active{transform:scale(.97)}

.container{
  min-height:100vh;
  min-height:100dvh;
  padding:calc(78px + env(safe-area-inset-top, 0px)) 14px 24px;
  display:flex;align-items:flex-start;justify-content:center;
}
.shell{width:min(920px,100%)}

.heroCard{
  border-radius:24px;
  border:1px solid rgba(79,172,254,.18);
  background:linear-gradient(165deg, rgba(22,36,58,.98) 0%, rgba(10,16,28,.92) 100%);
  box-shadow:var(--shadow);
  padding:18px 16px 16px;
  margin-bottom:20px;
}
.heroTop{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:10px;
}
.heroMark{
  width:48px;height:48px;border-radius:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  border:1px solid rgba(79,172,254,.35);
  background:linear-gradient(145deg, rgba(79,172,254,.22), rgba(0,242,254,.10));
}
.heroText{flex:1;min-width:0}
.hero .h{
  margin:0;
  font-size:clamp(21px,5.5vw,32px);
  font-weight:950;
  line-height:1.35;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero .sub{
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.65;
}
.badges{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:12px;
}
.badge{
  font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:999px;
  border:1px solid rgba(79,172,254,.32);
  background:rgba(79,172,254,.12);
  color:#c5e8ff;
  white-space:nowrap;
}
.badge.muted{
  border-color:var(--stroke);
  background:rgba(255,255,255,.05);
  color:var(--muted);
  font-weight:600;
}

.sectionHead{
  display:flex;align-items:center;justify-content:space-between;
  margin:0 0 10px 0;
  gap:10px;
}
.sectionTitle{
  margin:0;
  font-size:14px;font-weight:800;color:var(--text);
}
.sectionHint{font-size:11px;color:var(--muted)}

.games-grid{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.game-item{
  padding:12px 12px 12px 14px;
  border-radius:18px;
  border:1px solid var(--stroke);
  background:rgba(12,20,36,.85);
  transition:background .15s ease, border-color .15s ease;
  text-decoration:none;color:var(--text);
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:12px;
  min-height:0;
}
.game-item:active{background:rgba(255,255,255,.06)}
.game-item .game-icon{
  width:50px;height:50px;flex-shrink:0;
  border-radius:15px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;line-height:1;
}
.game-item .game-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.game-item .name{font-size:15px;font-weight:900;line-height:1.3}
.game-item .status{font-size:12px;color:var(--muted);line-height:1.4}
.game-item .record-line{
  font-size:11px;
  line-height:1.35;
  color:rgba(255,220,160,.88);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.game-item .record-line strong{font-weight:800;color:#fff0c8}
.game-item .record-line.loading{color:var(--muted);font-weight:500}
.game-item .record-line.empty{color:var(--muted);font-weight:500;font-size:10px}
.game-item .game-cta{
  flex-shrink:0;
  font-size:11px;font-weight:800;
  padding:8px 12px;border-radius:999px;
  border:1px solid rgba(0,242,254,.35);
  background:linear-gradient(135deg, rgba(79,172,254,.25), rgba(0,242,254,.12));
  color:#dff6ff;
}
.game-item.available{
  border-color:rgba(79,172,254,.28);
  background:linear-gradient(90deg, rgba(79,172,254,.10), rgba(12,20,36,.9));
}
.game-item.available .status{color:rgba(143,200,255,.95)}
.game-item.soon{opacity:.55;cursor:not-allowed}
.game-item.soon .game-cta{
  background:rgba(255,255,255,.04);
  border-color:var(--stroke);
  color:var(--muted);
}

.note{
  margin-top:14px;
  padding:12px 14px;
  border-radius:16px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--stroke);
  font-size:12px;
  color:var(--muted);
  line-height:1.65;
}

.modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  z-index:90;padding:16px;background:rgba(0,0,0,.55);
}
.modal.show{display:flex}
.cardModal{
  width:min(640px,94vw);border-radius:24px;border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(18,28,48,.96), rgba(8,14,26,.92));
  box-shadow:var(--shadow);padding:16px;
}
.modalHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.modalHeader h2{margin:0;font-size:16px}
.xbtn{
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);
  color:var(--text);border-radius:16px;padding:8px 12px;cursor:pointer;
}
.pill{
  height:42px;border-radius:16px;border:1px solid var(--stroke);
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;font-size:18px;color:var(--text);
}
.pill.active{box-shadow:0 0 0 2px rgba(79,172,254,.35) inset}
.small{color:var(--muted);font-size:13px}

@media (min-width:720px){
  .container{padding-left:20px;padding-right:20px}
  .heroCard{padding:22px 20px;border-radius:28px}
  .games-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .game-item:hover{background:rgba(255,255,255,.06);transform:translateY(-1px)}
}
@media (max-width:719px){
  .topbar{
    left:10px;right:10px;
    height:48px;border-radius:16px;
    padding:6px 10px;
  }
  .brand .appname{font-size:10px}
  .brand .title{font-size:13px}
  .iconBtn{width:36px;height:36px;border-radius:12px;font-size:17px}
  .container{
    padding:calc(58px + env(safe-area-inset-top, 0px)) 10px 6px;
    align-items:stretch;
  }
  .shell{
    display:flex;
    flex-direction:column;
    min-height:calc(100dvh - 58px - env(safe-area-inset-top, 0px) - 6px);
  }
  .heroCard{
    padding:8px 10px 8px;
    margin-bottom:6px;
    border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.28);
  }
  .heroTop{
    align-items:center;
    gap:8px;
    margin-bottom:0;
  }
  .heroMark{
    width:34px;height:34px;
    font-size:17px;
    border-radius:11px;
  }
  .hero .h{
    font-size:15px;
    line-height:1.2;
  }
  .hero .sub{display:none}
  .badges{
    margin-top:5px;
    gap:4px;
  }
  .badge{
    font-size:9px;
    padding:3px 7px;
  }
  .sectionHead{margin:0 0 5px}
  .sectionTitle{font-size:12px}
  .sectionHint{display:none}
  .games-grid{gap:5px;flex:1}
  .game-item{
    padding:6px 8px 6px 9px;
    gap:7px;
    border-radius:13px;
  }
  .game-item .game-icon{
    width:36px;height:36px;
    font-size:19px;
    border-radius:11px;
  }
  .game-item .game-body{gap:0}
  .game-item .name{font-size:13px;line-height:1.2}
  .game-item .status{display:none}
  .game-item .record-line{
    font-size:9px;
    line-height:1.25;
    margin-top:1px;
  }
  .game-item .game-cta{
    font-size:9px;
    padding:5px 8px;
  }
  .note{display:none}
  .badge.hide-sm{display:none}
}
@media (prefers-reduced-motion: reduce){
  .game-item,.iconBtn{transition:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="appname">روستر · DGR</div>
    <div class="title">ألعاب الذاكرة</div>
  </div>
  <button class="iconBtn" id="gamesBtn" title="قائمة الألعاب" type="button">🎮</button>
</div>

<div class="container">
  <div class="shell">
    <div class="heroCard">
      <div class="heroTop">
        <div class="heroMark" aria-hidden="true">🧠</div>
        <div class="heroText">
          <h1 class="h">درّب ذاكرتك بسرعة</h1>
        </div>
      </div>
      <p class="sub">ألعاب خفيفة في المتصفح — اختر لعبة أو زر 🎮 بالأعلى.</p>
      <div class="badges">
        <span class="badge">٤ ألعاب</span>
        <span class="badge muted">🏆 سجل عالمي</span>
        <span class="badge muted hide-sm">تحميل أسرع</span>
      </div>
    </div>

    <div class="sectionHead">
      <p class="sectionTitle">الألعاب</p>
      <span class="sectionHint">اضغط للعب</span>
    </div>
    <div class="games-grid" id="homeGamesGrid"></div>

    <div class="note">
      💡 في كل لعبة زر <strong>🎮</strong> يفتح نفس القائمة. الصور من CDN — الزيارة الثانية أسرع.
    </div>
  </div>
</div>

<div class="modal" id="gamesModal" role="dialog" aria-modal="true" aria-labelledby="gamesModalTitle">
  <div class="cardModal">
    <div class="modalHeader">
      <h2 id="gamesModalTitle">🎮 قائمة الألعاب</h2>
      <button class="xbtn" id="closeGames" type="button">إغلاق</button>
    </div>
    <div id="gamesList" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px"></div>
    <div class="small" style="margin-top:10px">⚡ القائمة من <code>games.json</code></div>
  </div>
</div>

<script>
const gamesBtn = document.getElementById("gamesBtn");
const gamesModal = document.getElementById("gamesModal");
const closeGames = document.getElementById("closeGames");

const GAMES_JSON_URL = "/games.json";
function toRootHref(href){
  if(!href || href==="#") return "#";
  if(/^https?:\/\//i.test(href)) return href;
  if(href.startsWith("/")) return href;
  return "/" + String(href).replace(/^\.?\//,"");
}

const CURRENT_GAME_ID = "home";

function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

async function fetchGames(){
  const res = await fetch(GAMES_JSON_URL, {cache:"default"});
  if(!res.ok) throw new Error("fetch failed: "+res.status);
  const data = await res.json();
  return Array.isArray(data?.games) ? data.games : [];
}

async function renderGamesMenu(){
  const box = document.getElementById("gamesList");
  if(!box) return;
  box.innerHTML = '<div class="small">جاري تحميل القائمة...</div>';
  try{
    const games = await fetchGames();
    if(!games.length) throw new Error("games.json فارغ");
    box.innerHTML = "";
    games.forEach(g=>{
      const id = String(g.id||"");
      const name = String(g.name||"لعبة");
      const icon = String(g.icon||"🎮");
      const note = String(g.note||"");
      const href = String(g.href||"#");
      const status = String(g.status||"soon");
      const isHere = (CURRENT_GAME_ID && id===CURRENT_GAME_ID);
      const isLive = status==="live" && href && href!=="#";
      if(isHere){
        box.insertAdjacentHTML("beforeend", `
          <div class="pill active" style="height:60px;flex-direction:column;gap:4px">
            <div>${escHtml(icon)} ${escHtml(name)}</div>
            <small style="font-size:11px;color:var(--muted)">أنت هنا</small>
          </div>
        `);
      } else if(isLive){
        box.insertAdjacentHTML("beforeend", `
          <a class="pill" href="${escHtml(toRootHref(href))}" style="height:60px;flex-direction:column;gap:4px">
            <div>${escHtml(icon)} ${escHtml(name)}</div>
            <small style="font-size:11px;color:var(--muted)">${escHtml(note)}</small>
          </a>
        `);
      } else {
        box.insertAdjacentHTML("beforeend", `
          <div class="pill" style="height:60px;flex-direction:column;gap:4px;opacity:.55;cursor:not-allowed">
            <div>${escHtml(icon)} ${escHtml(name)}</div>
            <small style="font-size:11px;color:var(--muted)">قريباً</small>
          </div>
        `);
      }
    });
  }catch(e){
    console.warn("games menu load failed", e);
    box.innerHTML = '<div class="small">تعذر تحميل قائمة الألعاب</div>';
  }
}

async function renderHomeGrid(){
  const host = document.getElementById("homeGamesGrid");
  if(!host) return;
  host.innerHTML = '<div class="small">جاري تحميل الألعاب...</div>';
  try{
    const games = await fetchGames();
    host.innerHTML = "";
    games.forEach(g=>{
      const name = String(g.name||"لعبة");
      const icon = String(g.icon||"🎮");
      const note = String(g.note||"");
      const href = String(g.href||"#");
      const status = String(g.status||"soon");
      const isLive = status==="live" && href && href!=="#";
      if(isLive){
        host.insertAdjacentHTML("beforeend", `
          <a class="game-item available" href="${escHtml(toRootHref(href))}">
            <div class="game-icon" aria-hidden="true">${escHtml(icon)}</div>
            <div class="game-body">
              <span class="name">${escHtml(name)}</span>
              <span class="status">${escHtml(note)}</span>
              <span class="record-line loading" data-leader-game="${escHtml(String(g.id||""))}">🏆 …</span>
            </div>
            <span class="game-cta">العب</span>
          </a>
        `);
      }else{
        host.insertAdjacentHTML("beforeend", `
          <div class="game-item soon">
            <div class="game-icon" aria-hidden="true">${escHtml(icon)}</div>
            <div class="game-body">
              <span class="name">${escHtml(name)}</span>
              <span class="status">قريباً · ${escHtml(note)}</span>
            </div>
            <span class="game-cta">قريباً</span>
          </div>
        `);
      }
    });
    if(window.__lastHomeLeaders) applyHomeLeaders(window.__lastHomeLeaders);
  }catch(e){
    console.warn("home grid load failed", e);
    host.innerHTML = '<div class="small">تعذر تحميل قائمة الألعاب</div>';
  }
}

function openGames(){
  renderGamesMenu();
  gamesModal.classList.add("show");
}
function closeGamesModal(){ gamesModal.classList.remove("show"); }

gamesBtn.addEventListener("click", openGames);
closeGames.addEventListener("click", closeGamesModal);
gamesModal.addEventListener("click", (e)=>{ if(e.target===gamesModal) closeGamesModal(); });

window.addEventListener("DOMContentLoaded", ()=>{
  renderHomeGrid();
});

function applyHomeLeaders(map){
  document.querySelectorAll("[data-leader-game]").forEach((el)=>{
    const id = el.getAttribute("data-leader-game");
    const rec = map && id ? map[id] : null;
    el.classList.remove("loading","empty");
    if(rec && rec.name){
      el.innerHTML = `🏆 <strong>${escHtml(rec.name)}</strong> · ${escHtml(rec.label || "")}`;
    }else{
      el.classList.add("empty");
      el.textContent = "🏆 لا سجل بعد";
    }
  });
}

window.addEventListener("home-leaders", (e)=>{
  window.__lastHomeLeaders = e.detail || {};
  applyHomeLeaders(window.__lastHomeLeaders);
});
</script>
<script type="module" src="/home-leaders.js"></script>

</body>
</html>
